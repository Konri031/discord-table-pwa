<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Discord Table</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  padding:12px;
}

textarea{
width:100%;
height:180px;
background:#1a1a1a;
color:white;
border:1px solid #333;
border-radius:10px;
padding:10px;
font-family:monospace;
}

button{
width:100%;
padding:14px;
margin-top:8px;
border:0;
border-radius:10px;
font-size:16px;
}

#gen{background:#2d6cdf;color:white;}
#copy{background:#1f7a3a;color:white;}

pre{
margin-top:10px;
background:#1a1a1a;
padding:10px;
border-radius:10px;
overflow-x:auto;
white-space:pre;
}
</style>

</head>
<body>

<h3>Discord Table</h3>

<textarea id="input"></textarea>

<button id="gen">Generate</button>
<button id="copy">Copy</button>

<pre id="out"></pre>

<script>

function parse(text){
return text.trim().split("\n").map(l =>
l.split(/\t|\|/).map(c=>c.trim())
);
}

function center(text, width){
  const total = width - text.length;
  const left = Math.floor(total / 2);
  const right = total - left;
  return " ".repeat(left) + text + " ".repeat(right);
}

function build(rows){
if(!rows.length)return"";

const w=Array(rows[0].length).fill(0);

rows.forEach(r=>{
r.forEach((c,i)=>{
w[i]=Math.max(w[i],c.length);
});
});

const header=rows[0]
.map((c,i)=>center(c,w[i]))
.join(" | ");

const sep = w.map(x => "-".repeat(x)).join(" | ");

const body=rows.slice(1).map(r=>
r.map((c,i)=>c.padEnd(w[i]," ")).join(" | ")
).join("\n");

return"```\n"+header+"\n"+sep+"\n"+body+"\n```";
}

const input=document.getElementById("input");
const out=document.getElementById("out");

document.getElementById("gen").onclick=()=>{
out.textContent=build(parse(input.value));
};

document.getElementById("copy").onclick=()=>{
const ta=document.createElement("textarea");
ta.value=out.textContent;
document.body.appendChild(ta);
ta.select();
document.execCommand("copy");
ta.remove();
};

input.addEventListener("input",()=>{
out.textContent=build(parse(input.value));
});

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
